apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: 063484726576.dkr.ecr.us-east-1.amazonaws.com/auth-service:c6665be9168fc7ec98d18d09cc27f10a3c22c47b
        ports:
        - containerPort: 8001
        envFrom:
        - secretRef:
            name: auth-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
