apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: 248063312521.dkr.ecr.us-east-1.amazonaws.com/auth-service:0565e2387e3d7b0e8a0aa571988f556d9ed0fd7c
        ports:
        - containerPort: 8001
        envFrom:
        - secretRef:
            name: auth-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
