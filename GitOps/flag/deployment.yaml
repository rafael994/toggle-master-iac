apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag
  namespace: flag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flag
  template:
    metadata:
      labels:
        app: flag
    spec:
      containers:
      - name: flag
        image: 248063312521.dkr.ecr.us-east-1.amazonaws.com/flags-service:3453ade612f44b889da7fcbb3bcb2c6c16113235
        ports:
        - containerPort: 8002
        envFrom:
        - secretRef:
            name: flag-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
