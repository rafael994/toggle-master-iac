apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: 837177764356.dkr.ecr.us-east-1.amazonaws.com/analytics-service:c605ade77b013ae9304a53ad3a8f5f8634aba085
          envFrom:
            - secretRef:
                name: aws-credentials
            - secretRef:
                name: analytics-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"