apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: 248063312521.dkr.ecr.us-east-1.amazonaws.com/analytics-service:f5c9285cacd0571a0e6ca84ae00db30fce985308
          envFrom:
            - secretRef:
                name: aws-credentials
            - secretRef:
                name: analytics-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
          - name: OTEL_SERVICE_NAME
            value: analytics-service
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: http://otel-gateway-opentelemetry-collector.observability.svc.cluster.local:4318
          - name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: http/protobuf
          - name: OTEL_RESOURCE_ATTRIBUTES
            value: service.namespace=togglemaster, deployment.environment=dev, k8s.namespace.name=analytics
          - name: OTEL_LOGS_EXPORTER
            value: otlp
          - name: OTEL_METRICS_EXPORTER
            value: otlp
          - name: OTEL_TRACES_EXPORTER
            value: otlp