apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting
  namespace: targeting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: targeting
  template:
    metadata:
      labels:
        app: targeting
    spec:
      containers:
      - name: targeting
        image: 248063312521.dkr.ecr.us-east-1.amazonaws.com/targeting-service:ca11c750f25bfc2c9f0d3ac5538001a5270847e0
        ports:
        - containerPort: 8003
        envFrom:
        - secretRef:
            name: targeting-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
