apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd

spec:
  project: default

  source:
    repoURL: http://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.24.0

    helm:
      releaseName: loki

      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false

          commonConfig:
            replication_factor: 1

          storage:
            type: filesystem

            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin

          storage_config:
            filesystem:
              directory: /var/loki/chunks

          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13

                index:
                  prefix: loki_index_
                  period: 24h

          limits_config:
            allow_structured_metadata: true

        singleBinary:
          replicas: 1

          resources:
            requests:
              memory: 256Mi
              cpu: 100m

            limits:
              memory: 512Mi
              cpu: 300m

          persistence:
            enabled: false

          extraVolumes:
            - name: storage
              emptyDir: {}

          extraVolumeMounts:
            - name: storage
              mountPath: /var/loki
        
        chunksCache:
          enabled: false

        resultsCache:
          enabled: false

        lokiCanary:
          enabled: false

        test:
          enabled: false

        monitoring:
          dashboards:
            enabled: false

          rules:
            enabled: false

          serviceMonitor:
            enabled: false

        gateway:
          enabled: true

        read:
          replicas: 0

        write:
          replicas: 0

        backend:
          replicas: 0

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true