name: CI Evaluation-Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.ECR_REPOSITORY_EVALUATION }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: |
          cd evaluation-service
          go mod download

      - name: Build
        run: |
          cd evaluation-service
          go build -v ./...

      - name: Run Unit Tests
        run: |
          cd evaluation-service
          go test -v ./...

  lint-static-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2

      - name: Run golangci-lint
        run: |
          cd evaluation-service
          $(go env GOPATH)/bin/golangci-lint run ./...

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-static-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # SCA com Trivy (go.mod)
      - name: Run Trivy SCA (go.mod)
        id: trivy-sca
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-sca-results.json'
          ignore-unfixed: true

      - name: Show Trivy SCA Results (pretty)
        run: jq . trivy-sca-results.json

      - name: Upload Trivy SCA results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sca-results
          path: trivy-sca-results.json

      # SAST com gosec
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec (SAST)
        run: |
          cd evaluation-service
          $(go env GOPATH)/bin/gosec -fmt=json -out=gosec-results.json ./... || true

      - name: Show Gosec Results (pretty)
        run: jq . evaluation-service/gosec-results.json

      - name: Upload Gosec results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gosec-results
          path: evaluation-service/gosec-results.json

      # Checa vulnerabilidades críticas no Trivy SCA e gosec (fail if found)
      - name: Fail on Critical Vulnerabilities (SCA & SAST)
        run: |
          CRIT_TRIVY=$(jq '[.Results[].Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' trivy-sca-results.json)
          CRIT_GOSEC=$(jq '[.Issues[] | select(.severity=="HIGH")] | length' evaluation-service/gosec-results.json)
          echo "Criticals in Trivy SCA: $CRIT_TRIVY"
          echo "Criticals in gosec (HIGH): $CRIT_GOSEC"
          if [ "$CRIT_TRIVY" != "0" ] || [ "$CRIT_GOSEC" != "0" ]; then
          echo "Critical vulnerabilities found! Failing pipeline."
          exit 1
          fi

        # Upload Trivy scan results as artifact
      - name: Upload Trivy Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-results
          path: trivy-image-results.json  

  docker-build-push:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker image (ajuste o caminho do Dockerfile se necessário)
      - name: Build Docker image
        run: |
          docker build -f evaluation-service/Dockerfile -t $IMAGE_NAME:${{ github.sha }} evaluation-service/

      # Scan Docker image com Trivy (container scan)
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'json'
          output: 'trivy-image-results.json'
          ignore-unfixed: true

      - name: Show Trivy Image Scan Results (pretty)
        run: jq . trivy-image-results.json

      - name: Upload Trivy Image Scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-results
          path: trivy-image-results.json

      # Fail on critical vulnerabilities in image scan
      - name: Fail on Critical Vulnerabilities (Image Scan)
        run: |
          CRIT_IMG=$(jq '[.Results[] | select(.Vulnerabilities != null) | .Vulnerabilities[] | select(.Severity=="CRITICAL")] | length' trivy-image-results.json)
          echo "Criticals in Image Scan: $CRIT_IMG"
          if [ "$CRIT_IMG" != "0" ]; then
            echo "Critical vulnerabilities found in image! Failing pipeline."
            exit 1
          fi

      # Login to AWS ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Push Docker image to ECR com tag do commit hash
      - name: Push Docker image to ECR
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:${{ github.sha }}