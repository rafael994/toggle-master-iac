name: CI Flag-service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.ECR_REPOSITORY_FLAG }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --user -r flag-service/requirements.txt

      - name: Run Unit Tests
        run: |
          if [ -f "pytest.ini" ] || [ -d "tests" ]; then
            pip install --user pytest
            pytest
          else
            echo "No tests found, skipping."
          fi

  lint-static-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linter
        run: pip install --user flake8

      - name: Run flake8 linter
        run: flake8 .

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-static-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # SCA com Trivy (dependências)
      - name: Run Trivy SCA (requirements.txt)
        id: trivy-sca
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-sca-results.json'
          ignore-unfixed: true

      - name: Show Trivy Image Scan Results (pretty)
        run: jq . trivy-sca-results.json

      - name: Upload Trivy Image Scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sca-results
          path: trivy-sca-results.json

      # SAST com Bandit
      - name: Run Bandit (SAST)
        id: bandit-sast
        run: |
          pip install --user bandit
          bandit -r . -f json -o bandit-results.json || true

      # Checa vulnerabilidades críticas no Trivy SCA e Bandit (fail if found)
      - name: Fail on Critical Vulnerabilities (SCA & SAST)
        run: |
          CRIT_TRIVY=$(jq '[.Results[].Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' trivy-sca-results.json)
          CRIT_BANDIT=$(jq '[.results[] | select(.issue_severity=="HIGH")] | length' bandit-results.json)
          echo "Criticals in Trivy SCA: $CRIT_TRIVY"
          echo "Criticals in Bandit (HIGH): $CRIT_BANDIT"
          if [ "$CRIT_TRIVY" != "0" ] || [ "$CRIT_BANDIT" != "0" ]; then
            echo "Critical vulnerabilities found! Failing pipeline."
            exit 1
          fi

  docker-build-push:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Diagnóstico: lista arquivos no contexto de build
      - name: Diagnóstico - Lista arquivos no contexto de build
        run: |
          echo "Diretório atual: $(pwd)"
          echo "Conteúdo da raiz do repositório:"
          ls -l
          echo "Conteúdo de flag-service/:"
          ls -l flag-service || true

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -f flag-service/Dockerfile -t $IMAGE_NAME:${{ github.sha }} .